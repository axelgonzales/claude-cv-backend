spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/cv_db}
    username: ${DATABASE_USERNAME:cv_user}
    password: ${DATABASE_PASSWORD:Axel2024Secure!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8081}

app:
  firebase:
    service-account: ${FIREBASE_SERVICE_ACCOUNT:classpath:firebase-service-account.json}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178,http://localhost:5179,http://localhost:5180}
